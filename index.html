<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Frameworks Sandbox</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --angular-color: #dd0031;
            --svelte-color: #ff3e00;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            margin: 0;
        }

        .header p {
            color: #888;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }

        .cards {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 280px;
            height: 320px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .card.angular:hover {
            border-color: var(--angular-color);
            box-shadow: 0 10px 40px rgba(221, 0, 49, 0.2);
        }

        .card.svelte:hover {
            border-color: var(--svelte-color);
            box-shadow: 0 10px 40px rgba(255, 62, 0, 0.2);
        }

        .card-icon {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .card.angular .card-icon {
            color: var(--angular-color);
        }

        .card.svelte .card-icon {
            color: var(--svelte-color);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .card-desc {
            color: #888;
            font-size: 0.9rem;
            text-align: center;
            padding: 0 1.5rem;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Frameworks Sandbox</h1>
        <p>Choose your engine</p>
    </div>

    <div class="cards">
        <a href="./angular/" class="card angular">
            <div class="card-icon">A</div>
            <div class="card-title">Angular 19</div>
            <div class="card-desc">Component-driven architecture with robust tooling.</div>
        </a>

        <a href="./svelte/" class="card svelte">
            <div class="card-icon">S</div>
            <div class="card-title">Svelte 5</div>
            <div class="card-desc">Pure DOM manipulation powered by Runes.</div>
        </a>
    </div>
</body>

</html>
