<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Frameworks Sandbox</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --angular-color: #dd0031;
            --svelte-color: #ff3e00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #050505 70%);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            align-items: center;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 4rem;
            width: 100%;
            gap: 4rem;
        }

        .text-section {
            flex: 1;
            max-width: 550px;
            z-index: 10;
        }

        .eyebrow {
            color: #888;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: block;
        }

        h1 {
            font-size: clamp(3rem, 5vw, 4.5rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #fff, #a1a1aa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .description {
            color: #a1a1aa;
            font-size: 1.125rem;
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .logos-section {
            flex: 1;
            position: relative;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-link {
            position: absolute;
            display: block;
            width: 180px;
            height: auto;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .logo-link.angular {
            filter: drop-shadow(0 0 25px rgba(221, 0, 49, 0.4));
        }

        .logo-link.svelte {
            filter: drop-shadow(0 0 25px rgba(255, 62, 0, 0.4));
        }

        .logo-link svg {
            width: 100%;
            height: auto;
            display: block;
        }

        .logo-link.angular {
            top: 15%;
            left: 10%;
            transform: rotate(-12deg);
        }

        .logo-link.svelte {
            bottom: 15%;
            right: 10%;
            transform: rotate(15deg);
        }

        .logo-link.angular:hover {
            transform: scale(1.15) rotate(0deg) translateY(-10px);
            filter: drop-shadow(0 0 60px var(--angular-color));
            z-index: 20;
        }

        .logo-link.svelte:hover {
            transform: scale(1.15) rotate(0deg) translateY(-10px);
            filter: drop-shadow(0 0 60px var(--svelte-color));
            z-index: 20;
        }

        @media (max-width: 900px) {
            body {
                align-items: flex-start;
            }

            .container {
                flex-direction: column;
                text-align: center;
                padding: 4rem 2rem;
                gap: 2rem;
            }

            .text-section {
                margin-bottom: 2rem;
            }

            .eyebrow {
                margin-bottom: 1rem;
            }

            .logos-section {
                width: 100%;
                height: 350px;
            }

            .logo-link {
                width: 140px;
            }

            .logo-link.angular {
                top: 10%;
                left: 5%;
            }

            .logo-link.svelte {
                bottom: 10%;
                right: 5%;
            }
        }
    </style>
</head>

            <h1>Frameworks<br>Sandbox.</h1>
