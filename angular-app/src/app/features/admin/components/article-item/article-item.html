@let data = article();
<div
  class="bg-gray-900 border border-gray-800 p-4 rounded-xl flex items-center justify-between group hover:border-gray-600 transition-colors">
  <div>
    <div class="flex items-center space-x-2 mb-1">
      <span class="text-xs font-bold text-[#dd0031] uppercase">{{ data.category }}</span>
      <span class="text-xs text-gray-500">{{ data.date }}</span>
    </div>
    <h3 class="text-lg font-bold text-white">{{ data.title }}</h3>
    <p class="text-sm text-gray-400">By {{ data.author.name }}</p>
  </div>

  <div class="flex space-x-2 opacity-0 group-hover:opacity-100 transition-opacity">
    <button
      (click)="onEdit.emit(article().toData())"
      class="bg-blue-600 hover:bg-blue-500 cursor-pointer text-white text-sm font-medium py-1.5 px-3 rounded">
      Edit
    </button>
    <button
      (click)="onDelete.emit(article().id)"
      class="bg-red-600 hover:bg-red-500 cursor-pointer text-white text-sm font-medium py-1.5 px-3 rounded">
      Delete
    </button>
  </div>
</div>
