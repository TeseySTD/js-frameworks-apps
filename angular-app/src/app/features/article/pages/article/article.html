@if (article(); as data) {
<article class="max-w-3xl mx-auto py-12 px-6 animate-fade-in">

    <a routerLink="/" class="inline-flex items-center text-gray-400 hover:text-white transition-colors mb-12 group">
        <svg xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 mr-2 transform group-hover:-translate-x-1 transition-transform" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Back to Home
    </a>

    <header class="mb-12">
        <div class="flex items-center space-x-3 mb-6">
            <span class="bg-[#dd0031] text-white text-xs font-bold px-3 py-1 rounded-full uppercase tracking-widest">
                {{ data.category }}
            </span>
            <span class="text-gray-400 text-sm font-medium uppercase tracking-wider">
                {{ data.date }}
            </span>
        </div>

        <h1 class="text-4xl md:text-5xl font-extrabold text-white leading-tight mb-8">
            {{ data.title }}
        </h1>

        <div class="flex items-center space-x-4 border-b border-gray-800 pb-8">
            <ui-avatar [src]="data.author.avatar" class="w-12 h-12" />
            <div>
                <div class="text-white font-bold">{{ data.author.name }}</div>
                <div class="text-gray-400 text-sm">Author & Backend Developer</div>
            </div>
        </div>
    </header>

    <div class="space-y-6 text-gray-300 text-lg leading-relaxed">
        @for (paragraph of data.content; track $index) {
        <p>{{ paragraph }}</p>
        }
    </div>

</article>
} @else {
<div class="max-w-3xl mx-auto py-20 text-center">
    <h2 class="text-3xl font-bold text-white mb-4">Статтю не знайдено 404</h2>
    <a routerLink="/" class="text-[#dd0031] hover:underline">Повернутися на головну</a>
</div>
}
